<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1> WireGuard VPN Dashboard</h1>
            <div style="display:flex; align-items:center; gap:12px;">
                <span id="server-status" class="badge">Loading...</span>
                <a href="/logout" class="logout-btn">Logout</a>
            </div>
        </header>

        <div class="cards">
            <div class="card">
                <h3>Server Interfaces</h3>
                <div id="interfaces">Loading...</div>
            </div>
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h3 style="margin-bottom:0">Connected Peers</h3>
                    <button class="add-btn" onclick="addPeer()">+ Add Peer</button>
                </div>
                <div id="peers">Loading...</div>
            </div>
        </div>

        <!-- Add Peer Modal -->
        <div id="modal" class="modal hidden">
            <div class="modal-box">
                <h3>New Peer Created</h3>
                <p class="modal-sub">Save this config — the private key won't be shown again.</p>
                <div id="modal-info"></div>
                <textarea id="modal-config" readonly></textarea>
                <div style="display:flex; gap:10px; margin-top:12px;">
                    <button class="login-btn" onclick="copyConfig()">Copy Config</button>
                    <button class="logout-btn" style="padding:12px; border-radius:8px; cursor:pointer; border:none;" onclick="closeModal()">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function fetchStatus() {
            fetch('/api/status')
                .then(res => res.json())
                .then(data => {
                    if (data.error) {
                        document.getElementById('interfaces').innerHTML = `<p class="error">Error: ${data.error}</p>`;
                        return;
                    }

                    const badge = document.getElementById('server-status');
                    badge.textContent = '🟢 Online';
                    badge.className = 'badge online';

                    let ifaceHTML = '';
                    let peersHTML = '';

                    data.interfaces.forEach(iface => {
                        ifaceHTML += `
                            <div class="iface-block">
                                <p><span class="label">Interface:</span> ${iface.name}</p>
                                <p><span class="label">Public Key:</span> <code>${iface.public_key}</code></p>
                                <p><span class="label">Port:</span> UDP ${iface.listening_port}</p>
                            </div>
                        `;

                        if (iface.peers.length === 0) {
                            peersHTML += `<p class="no-peers">No peers on ${iface.name}</p>`;
                        }

                        iface.peers.forEach(peer => {
                            const statusClass = peer.status === 'connected' ? 'connected' : 'disconnected';
                            const statusIcon = peer.status === 'connected' ? '🟢' : '🔴';
                            peersHTML += `
                                <div class="peer-block ${statusClass}">
                                    <div style="display:flex; justify-content:space-between; align-items:center;">
                                        <p><span class="label">Interface:</span> ${iface.name}</p>
                                        <button class="remove-btn" onclick="removePeer('${peer.public_key}')">Remove</button>
                                    </div>
                                    <p><span class="label">Status:</span> ${statusIcon} ${peer.status}</p>
                                    <p><span class="label">Allowed IP:</span> ${peer.allowed_ips}</p>
                                    <p><span class="label">Endpoint:</span> ${peer.endpoint}</p>
                                    <p><span class="label">Last Handshake:</span> ${peer.latest_handshake}</p>
                                    <p><span class="label">↓ Received:</span> ${peer.transfer_rx}</p>
                                    <p><span class="label">↑ Sent:</span> ${peer.transfer_tx}</p>
                                    <p><span class="label">Public Key:</span> <code>${peer.public_key.substring(0, 20)}...</code></p>
                                </div>
                            `;
                        });
                    });

                    document.getElementById('interfaces').innerHTML = ifaceHTML;
                    document.getElementById('peers').innerHTML = peersHTML;
                })
                .catch(() => {
                    document.getElementById('server-status').textContent = '🔴 Offline';
                    document.getElementById('server-status').className = 'badge offline';
                });
        }

        function addPeer() {
            fetch('/api/peers/add', { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    if (data.error) {
                        alert('Error: ' + data.error);
                        return;
                    }
                    document.getElementById('modal-info').innerHTML = `
                        <p><span class="label">Peer IP:</span> ${data.peer_ip}</p>
                        <p><span class="label">Public Key:</span> <code>${data.public_key.substring(0, 30)}...</code></p>
                    `;
                    document.getElementById('modal-config').value = data.client_config;
                    document.getElementById('modal').classList.remove('hidden');
                    fetchStatus();
                });
        }

        function removePeer(publicKey) {
            if (!confirm('Remove this peer? They will be disconnected immediately.')) return;
            fetch('/api/peers/remove', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ public_key: publicKey })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) fetchStatus();
                else alert('Error: ' + data.error);
            });
        }

        function copyConfig() {
            const config = document.getElementById('modal-config').value;
            navigator.clipboard.writeText(config);
            alert('Config copied to clipboard!');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        fetchStatus();
        setInterval(fetchStatus, 10000);
    </script>
</body>
</html>
